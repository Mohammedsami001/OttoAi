services:
  - type: web
    name: ottoai-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB_NAME
        value: personal-ops
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: APP_ENV
        value: production
      - key: DEMO_MODE
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11"
    healthCheckPath: /health
    autoDeploy: true
